<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرشدك — دليلك للدوائر الحكومية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #1d6fa4;
    --accent2: #22c55e;
    --accent-glow: rgba(29,111,164,0.25);
    --text: #e8edf5;
    --text-muted: #6b7fa3;
    --text-dim: #3d5070;
    --user-bubble: #1a3a5c;
    --agent-bubble: #131f30;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans Arabic','Tajawal',sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(29,111,164,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(34,197,94,0.04) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background-image:
      linear-gradient(rgba(29,111,164,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(29,111,164,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events:none;
    z-index:0;
  }

  /* ── HEADER ── */
  header {
    position:relative;
    z-index:10;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,23,0.92);
    backdrop-filter: blur(20px);
    display:flex;
    align-items:center;
    gap:12px;
    flex-shrink:0;
  }
  .logo {
    width:40px; height:40px;
    background: linear-gradient(135deg, var(--accent), #0a3d62);
    border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
    box-shadow: 0 0 18px var(--accent-glow);
    flex-shrink:0;
  }
  .header-info h1 {
    font-family:'Tajawal',sans-serif;
    font-size:19px; font-weight:900;
    background: linear-gradient(135deg,#e8edf5,#7eb8d8);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .header-info p { font-size:11.5px; color:var(--text-muted); font-weight:300; }
  .online-badge {
    margin-right:auto;
    display:flex; align-items:center; gap:6px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.18);
    padding: 4px 11px; border-radius:20px;
    font-size:11.5px; color:var(--accent2);
  }
  .dot { width:6px; height:6px; background:var(--accent2); border-radius:50%; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }

  /* ── CHAT ── */
  .chat {
    position:relative; z-index:10;
    flex:1; overflow-y:auto;
    padding: 20px 14px;
    display:flex; flex-direction:column; gap:14px;
    scroll-behavior:smooth;
  }
  .chat::-webkit-scrollbar { width:3px; }
  .chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg {
    display:flex; gap:9px;
    max-width:88%;
    animation: up .28s ease forwards;
    opacity:0;
  }
  @keyframes up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.agent { align-self:flex-start; }
  .msg.user  { align-self:flex-end; flex-direction:row-reverse; }

  .av {
    width:32px; height:32px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0; margin-top:3px;
  }
  .av.a { background:linear-gradient(135deg,var(--accent),#0a3d62); box-shadow:0 0 10px var(--accent-glow); }
  .av.u { background:var(--surface2); border:1px solid var(--border); }

  .bubble {
    padding: 12px 15px;
    font-size:14px; line-height:1.75;
    border-radius:14px;
  }
  .agent .bubble {
    background:var(--agent-bubble);
    border:1px solid var(--border);
    border-radius:3px 14px 14px 14px;
  }
  .user .bubble {
    background:var(--user-bubble);
    border:1px solid rgba(29,111,164,0.25);
    border-radius:14px 3px 14px 14px;
  }

  /* steps card */
  .card {
    margin-top:10px;
    background:rgba(255,255,255,0.025);
    border:1px solid var(--border);
    border-radius:11px; overflow:hidden;
  }
  .card-head {
    background:rgba(29,111,164,0.12);
    padding:8px 13px; font-size:12.5px; font-weight:600;
    color:#7eb8d8; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:6px;
  }
  .step {
    display:flex; gap:10px; align-items:flex-start;
    padding:9px 13px; font-size:13px;
    border-bottom:1px solid rgba(30,45,69,.4);
  }
  .step:last-child { border-bottom:none; }
  .sn {
    width:22px; height:22px; min-width:22px;
    background:var(--accent); border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff; margin-top:1px;
  }
  .sc strong { display:block; color:var(--text); margin-bottom:1px; }
  .sc span   { color:var(--text-muted); font-size:12px; }

  /* doc tags */
  .tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
  .tag {
    background:rgba(245,158,11,.08);
    border:1px solid rgba(245,158,11,.2);
    color:#fbbf24; padding:3px 9px;
    border-radius:20px; font-size:12px;
    display:flex; align-items:center; gap:4px;
  }

  /* info chips */
  .chips { display:flex; gap:8px; flex-wrap:wrap; margin-top:9px; }
  .chip {
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    padding:5px 11px; border-radius:7px;
    font-size:12px; color:var(--text-muted);
    display:flex; align-items:center; gap:4px;
  }
  .chip b { color:var(--text); font-weight:500; }

  /* quick replies */
  .qrs { display:flex; flex-wrap:wrap; gap:7px; margin-top:11px; }
  .qr {
    background:rgba(29,111,164,.09);
    border:1px solid rgba(29,111,164,.28);
    color:#7eb8d8; padding:6px 13px;
    border-radius:20px; font-size:13px;
    cursor:pointer; font-family:inherit;
    transition:all .18s; direction:rtl;
  }
  .qr:hover { background:rgba(29,111,164,.2); border-color:var(--accent); color:var(--text); transform:translateY(-1px); }

  /* typing */
  .typing { display:flex; gap:9px; align-items:flex-start; animation:up .28s ease forwards; }
  .tdots {
    background:var(--agent-bubble); border:1px solid var(--border);
    border-radius:3px 14px 14px 14px;
    padding:13px 16px; display:flex; gap:5px; align-items:center;
  }
  .tdots span {
    width:6px; height:6px; background:var(--text-muted);
    border-radius:50%; animation:bounce 1.2s infinite;
  }
  .tdots span:nth-child(2){animation-delay:.2s}
  .tdots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-5px);opacity:1} }

  /* ── INPUT ── */
  .input-area {
    position:relative; z-index:10;
    padding:13px 14px;
    border-top:1px solid var(--border);
    background:rgba(10,14,23,.95);
    backdrop-filter:blur(20px);
    flex-shrink:0;
  }
  .iw {
    display:flex; gap:9px; align-items:flex-end;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px; padding:9px 13px;
    transition:border-color .2s, box-shadow .2s;
  }
  .iw:focus-within {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-glow);
  }
  textarea {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:inherit; font-size:14px;
    resize:none; min-height:22px; max-height:110px;
    line-height:1.6; direction:rtl;
  }
  textarea::placeholder { color:var(--text-dim); }
  .sbtn {
    width:36px; height:36px; min-width:36px;
    background:linear-gradient(135deg,var(--accent),#0a3d62);
    border:none; border-radius:9px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; color:#fff;
    transition:all .18s;
    box-shadow:0 0 10px var(--accent-glow);
  }
  .sbtn:hover:not(:disabled) { transform:scale(1.06); box-shadow:0 0 18px var(--accent-glow); }
  .sbtn:disabled { opacity:.35; cursor:not-allowed; transform:none; }
  .hint { text-align:center; font-size:11px; color:var(--text-dim); margin-top:7px; }

  /* alert */
  .alert {
    background:rgba(239,68,68,.08);
    border:1px solid rgba(239,68,68,.2);
    color:#fca5a5; padding:10px 14px;
    border-radius:10px; font-size:13px; margin-top:8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🏛️</div>
  <div class="header-info">
    <h1>مرشدك</h1>
    <p>دليلك الذكي للدوائر الحكومية في العراق</p>
  </div>
  <div class="online-badge">
    <div class="dot"></div>
    متصل
  </div>
</header>

<div class="chat" id="chat">
  <div class="msg agent">
    <div class="av a">🏛️</div>
    <div class="bubble">
      أهلاً وسهلاً! 👋<br><br>
      أنا <strong>مرشدك</strong> — بوتك الذكي للإجراءات الحكومية في العراق.<br><br>
      حكيلي شنو مشكلتك وأقولك وين تروح وشنو تجيب معك بالضبط 🎯
      <div class="qrs">
        <button class="qr" onclick="quick('ضاع جوازي شسوي؟')">🛂 ضاع الجواز</button>
        <button class="qr" onclick="quick('أريد أجدد جواز سفري')">🔄 تجديد جواز</button>
        <button class="qr" onclick="quick('أريد أسجل شركة')">🏢 تسجيل شركة</button>
        <button class="qr" onclick="quick('أريد أفتح مشروع فردي')">👤 مشروع فردي</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="iw">
    <button class="sbtn" id="sbtn" onclick="send()">↑</button>
    <textarea id="inp" placeholder="اكتب مشكلتك هنا... مثلاً: ضاع جوازي شسوي؟"
      rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'">
    </textarea>
  </div>
  <div class="hint">اكتب بالعامية العراقية — مرشدك يفهمك 😊</div>
</div>

<script>
let busy = false;
let history = [];
const chat = document.getElementById('chat');
const inp  = document.getElementById('inp');
const sbtn = document.getElementById('sbtn');

function quick(t){ inp.value=t; send(); }

function addMsg(role, html){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const em = role==='agent'?'🏛️':'👤';
  const ac = role==='agent'?'a':'u';
  wrap.innerHTML = `<div class="av ${ac}">${em}</div><div class="bubble">${html}</div>`;
  chat.appendChild(wrap);
  scroll();
  return wrap;
}

function showTyping(){
  const t = document.createElement('div');
  t.className='typing'; t.id='typing';
  t.innerHTML=`<div class="av a">🏛️</div><div class="tdots"><span></span><span></span><span></span></div>`;
  chat.appendChild(t); scroll();
}
function hideTyping(){ document.getElementById('typing')?.remove(); }
function scroll(){ setTimeout(()=>{ chat.scrollTop=chat.scrollHeight; },40); }

function fmt(txt){
  return txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/⚠️/g,'<span style="color:#fbbf24">⚠️</span>')
    .replace(/✅/g,'<span style="color:#4ade80">✅</span>')
    .replace(/\n\n/g,'<br><br>')
    .replace(/\n/g,'<br>');
}

async function send(){
  if(busy) return;
  const text = inp.value.trim();
  if(!text) return;
  inp.value=''; inp.style.height='auto';
  busy=true; sbtn.disabled=true;

  addMsg('user', fmt(text));
  history.push({role:'user', content:text});
  showTyping();

  try {
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: history})
    });
    const data = await res.json();
    hideTyping();

    if(data.error){
      addMsg('agent',`<div class="alert">⚠️ ${fmt(data.error)}</div>`);
    } else {
      history.push({role:'assistant', content:data.reply});
      addMsg('agent', fmt(data.reply));
    }
  } catch(e){
    hideTyping();
    addMsg('agent','<div class="alert">⚠️ ما أقدر أتصل بالسيرفر. تأكد من الاتصال وحاول مرة ثانية.</div>');
  }
  busy=false; sbtn.disabled=false; inp.focus();
}
</script>
</body>
</html>
